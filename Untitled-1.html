<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人作品集電子書 | Portfolio Book</title>
    <style>
        /* ==========================================================================
           1. 全局樣式與變數設定
           ========================================================================== */
        :root {
            --bg-color: #0d0d11;       /* 網頁背景深色 */
            --book-cover: #1a1a24;     /* 書本封面顏色 */
            --book-page: #1e1e26;      /* 書頁內頁背景色 */
            --text-color: #e2e2e9;     /* 主要文字顏色 */
            --accent-color: #5f33ff;   /* 強調色 */
            --shadow-color: rgba(0, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
            overflow: hidden; /* 隱藏捲軸，確保全螢幕體驗 */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1500px; /* 3D 翻頁透視度 */
        }

        /* Canvas 背景流體與殘影粒子畫布 */
        #trail-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none; /* 讓滑鼠事件穿透畫布，不影響翻頁點擊 */
            z-index: 1; /* 放在最底層作為動態背景 */
        }

        /* ==========================================================================
           2. 電子書主體與響應式容器
           ========================================================================== */
        .book-container {
            position: relative;
            width: 1100px; 
            height: 730px; 
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); 
            z-index: 10;
            transform-style: preserve-3d;
        }

        /* 書本震動動畫 (被小寵物落地或翻頁驚嚇時觸發) */
        .shake-effect {
            animation: bookShake 0.15s linear infinite;
        }

        @keyframes bookShake {
            0% { translate: 0 0; }
            25% { translate: -2px 1px; }
            50% { translate: 1px, -2px; }
            75% { translate: -1px, -1px; }
            100% { translate: 2px, 2px; }
        }

        .book {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            box-shadow: 0 30px 60px var(--shadow-color);
        }

        /* ==========================================================================
           3. 單頁書頁 3D 結構
           ========================================================================== */
        .page {
            position: absolute;
            width: 50%; 
            height: 100%;
            top: 0;
            right: 0; 
            transform-origin: left center; 
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1;
            cursor: pointer;
        }

        /* 區分正面與反面 */
        .page-front, .page-back {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            backface-visibility: hidden; 
            padding: 30px;
            background-color: var(--book-page);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.4);
        }

        .page-back {
            transform: rotateY(180deg); 
        }

        /* 書頁翻開與層級控制 */
        .page.flipped {
            transform: rotateY(-180deg); 
        }

        /* ==========================================================================
           4. 內頁圖文版面樣式
           ========================================================================== */
        .cover-front {
            background: linear-gradient(135deg, #1a1a24 0%, #101015 100%);
            border-left: 5px solid var(--accent-color);
        }
        .cover-back {
            background: linear-gradient(225deg, #1a1a24 0%, #101015 100%);
            border-right: 5px solid var(--accent-color);
        }

        h1 {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 15px;
            text-shadow: 0 0 10px var(--accent-color);
            text-align: center;
        }

        h2 {
            font-size: 1.8rem;
            color: var(--accent-color);
            margin-bottom: 20px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 5px;
            width: 100%;
        }

        .profile-info {
            width: 100%;
            max-width: 320px;
            margin-top: 20px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 1.05rem;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }

        .info-label {
            color: rgba(255,255,255,0.5);
        }

        .info-value {
            color: #fff;
            font-weight: bold;
        }

        .description {
            font-size: 0.95rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.7);
            text-align: justify;
            margin-top: 15px;
            width: 100%;
        }

        .img-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            border-radius: 4px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            pointer-events: none;
        }

        .page-number {
            position: absolute;
            bottom: 15px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.3);
        }
        .page-front .page-number { right: 20px; }
        .page-back .page-number { left: 20px; }

        .hint {
            font-size: 0.9rem;
            color: rgb(173, 116, 199);
            margin-top: 30px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* ==========================================================================
           5. RWD 響應式手機版切換
           ========================================================================== */
        @media (max-width: 950px) {
            body {
                perspective: 1000px;
                padding: 10px;
            }

            .book-container {
                width: 100%;
                max-width: 550px; 
                height: 75vh;     
            }

            .page {
                width: 100%; 
                right: 0;
                transform-origin: left center;
            }

            .page.flipped {
                transform: rotateY(-180deg) translateX(0); 
                opacity: 0;
                pointer-events: none; 
            }
            
            .page-front, .page-back {
                padding: 15px; 
            }

            h1 { font-size: 1.8rem; }
            h2 { font-size: 1.4rem; }
            .info-item { font-size: 0.9rem; }
            .description { font-size: 0.85rem; }
        }

        /* ==========================================================================
           6. 互動小寵物與按讚特效樣式
           ========================================================================== */
        #pet-container {
            position: fixed;
            width: 110px;
            height: 110px;
            left: 100px;
            bottom: 20px; 
            cursor: pointer;
            z-index: 10000;
            user-select: none;
            transition: filter 0.3s ease, transform 0.1s ease;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
            transform-origin: bottom center; 
        }

        #pet-container:hover {
            filter: drop-shadow(0 0 15px var(--accent-color)) brightness(1.2);
        }

        #pet-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            transition: filter 0.2s ease; 
        }

        /* 飄浮文字特效 */
        .like-effect {
            position: fixed;
            color: #ff3366;
            font-weight: bold;
            font-size: 1.2rem;
            white-space: nowrap;
            pointer-events: none;
            z-index: 10001;
            text-shadow: 0 0 8px rgba(255, 51, 102, 0.8), 0 0 15px #000;
            animation: floatUpAndFade 1.2s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }

        @keyframes floatUpAndFade {
            0% {
                transform: translate(-50%, 0) scale(0.5);
                opacity: 0;
            }
            20% {
                transform: translate(-50%, -20px) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -120px) scale(0.9);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="book-container" id="book-container">

        <img id="pet-img" src="img/12.png" alt="Pet">

    <script>
        /* ----------------------------------------------------------------------
         * (A) 3D 電體書翻頁控制邏輯與【跨維度風力感應】
         * ---------------------------------------------------------------------- */
        const pages = document.querySelectorAll('.page');
        const bookContainer = document.getElementById('book-container');

        function updateZIndices() {
            pages.forEach((page, index) => {
                if (page.classList.contains('flipped')) {
                    page.style.zIndex = index + 1;
                } else {
                    page.style.zIndex = pages.length - index;
                }
            });
        }
        updateZIndices();

        pages.forEach((page, index) => {
            page.addEventListener('click', (e) => {
                let direction = 1; // 1代表往左翻，-1代表往右翻
                if (page.classList.contains('flipped')) {
                    page.classList.remove('flipped');
                    direction = -1;
                } else {
                    page.classList.add('flipped');
                    direction = 1;
                }
                updateZIndices();
                updateVisiblePages(); 

                // 1. 跨維度驚嚇寵物
                triggerPetFright();

                // 2. 【新功能】引發網頁翻頁物理狂風，狂風會吹散全螢幕背景粒子
                triggerPageFlipWind(direction);
            });
        });


        /* ----------------------------------------------------------------------
         * (B) 全域進化版 Canvas：太空微塵背景 + 滑鼠萬有引力 + Combo 愛心煙火
         * ---------------------------------------------------------------------- */
        const canvas = document.getElementById('trail-canvas');
        const ctx = canvas.getContext('2d');
        
        let ambientParticles = []; // 常駐太空微塵粒子
        let burstParticles = [];    // 點擊爆發的愛心煙火粒子
        
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let lastMouseX = mouseX;
        let lastMouseY = mouseY;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initAmbientParticles();
        }

        // 初始化背景太空微塵（100顆）
        function initAmbientParticles() {
            ambientParticles = [];
            const count = 100; 
            for (let i = 0; i < count; i++) {
                ambientParticles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5, // 緩慢自主移動速度
                    vy: (Math.random() - 0.5) * 0.5,
                    radius: Math.random() * 2.5 + 0.5,
                    alpha: Math.random() * 0.4 + 0.1,
                    baseAlpha: Math.random() * 0.4 + 0.1,
                    phase: Math.random() * Math.PI * 2 // 用於呼吸燈效果
                });
            }
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 滑鼠移動：計算視差與注入滑鼠引力
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            // 書本 3D 視差傾斜
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const dx = (mouseX - cx) / cx;
            const dy = (mouseY - cy) / cy;
            bookContainer.style.transform = `rotateX(${-dy * 6}deg) rotateY(${dx * 6}deg)`;
        });

        window.addEventListener('mouseleave', () => {
            bookContainer.style.transform = `rotateX(0deg) rotateY(0deg)`;
        });

        // 【新功能】翻頁時吹起大風的物理公式
        function triggerPageFlipWind(dir) {
            const windForce = dir * 15; // 風力強度
            ambientParticles.forEach(p => {
                p.vx += windForce * (Math.random() * 0.5 + 0.5);
                p.vy += (Math.random() - 0.5) * 5;
            });
            // 同時也吹散爆發中的愛心煙火
            burstParticles.forEach(p => {
                p.vx += windForce * 0.8;
            });
        }

        // 【新功能】繪製愛心形狀的函數 (不使用任何外部圖檔)
        function drawHeart(ctx, x, y, size) {
            ctx.beginPath();
            ctx.moveTo(x, y + size / 4);
            ctx.bezierCurveTo(x, y - size / 2, x - size, y - size / 2, x - size, y + size / 4);
            ctx.bezierCurveTo(x - size, y + (size * 0.9), x, y + size * 1.4, x, y + size * 1.5);
            ctx.bezierCurveTo(x, y + size * 1.4, x + size, y + (size * 0.9), x + size, y + size / 4);
            ctx.bezierCurveTo(x + size, y - size / 2, x, y - size / 2, x, y + size / 4);
            ctx.closePath();
            ctx.fill();
        }

        // 【新功能】連擊小寵物時，從滑鼠周圍噴發大量愛心煙火
        function createHeartBurst(x, y, count) {
            const colors = ['#ff3366', '#5f33ff', '#ff00ff', '#00ffff', '#ffff00'];
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 2;
                burstParticles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 2, // 帶有一點向上的初速度
                    size: Math.random() * 6 + 4,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    alpha: 1,
                    decay: Math.random() * 0.02 + 0.015,
                    rotation: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.1
                });
            }
        }

        // 背景粒子物理主迴圈
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. 渲染與計算太空微塵背景 (萬有引力跟隨)
            ambientParticles.forEach(p => {
                // 自主呼吸燈
                p.phase += 0.01;
                p.alpha = p.baseAlpha + Math.sin(p.phase) * 0.1;

                // 計算微塵與滑鼠的距離
                const dx = mouseX - p.x;
                const dy = mouseY - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                // 萬有引力半徑設定為 250 像素
                if (dist < 250) {
                    const force = (250 - dist) / 250;
                    p.vx += (dx / dist) * force * 0.15;
                    p.vy += (dy / dist) * force * 0.15;
                }

                // 摩擦力減速（避免無限加速）
                p.vx *= 0.95;
                p.vy *= 0.95;

                // 更新坐標
                p.x += p.vx;
                p.y += p.vy;

                // 邊界回彈或流體循環
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;

                // 畫出微塵
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(95, 51, 255, ${p.alpha})`;
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#5f33ff';
                ctx.fill();
            });

            // 2. 渲染與計算 Combo 噴發的霓虹愛心煙火
            for (let i = burstParticles.length - 1; i >= 0; i--) {
                const p = burstParticles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1; // 受到微弱重力往下墜
                p.alpha -= p.decay;

                if (p.alpha <= 0) {
                    burstParticles.splice(i, 1);
                    continue;
                }

                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                // 渲染霓虹愛心
                drawHeart(ctx, p.x, p.y, p.size);
                ctx.restore();
            }

            requestAnimationFrame(animateParticles);
        }
        requestAnimationFrame(animateParticles);


        /* ----------------------------------------------------------------------
         * (C) 互動小寵物 (12.png) 進階 AI 狀態機與連擊偵測系統
         * ---------------------------------------------------------------------- */
        const pet = document.getElementById('pet-container');
        const petImg = document.getElementById('pet-img');
        
        let petX = Math.random() * (window.innerWidth - 110);
        let speedX = 2; 
        let jumpY = 0;
        let jumpSpeed = 0;
        let isJumping = false;
        const gravity = 0.4;

        let totalLikes = 0; 
        let isFrightened = false; 

        // Combo 連擊計數器變數
        let comboCount = 0;
        let lastClickTime = 0;

        const likesData = { "封面": 0, "ABOUT ME": 0, "THE END": 0 };
        for(let i = 1; i <= 11; i++) { likesData[`作品 ${i}`] = 0; }
        let leftPageName = "無";
        let rightPageName = "封面";

        function updateVisiblePages() {
            let flippedCount = 0;
            pages.forEach((page) => {
                if (page.classList.contains('flipped')) flippedCount++;
            });
            if (flippedCount === 0) {
                leftPageName = "無"; rightPageName = "封面";
            } else if (flippedCount === 1) {
                leftPageName = "ABOUT ME"; rightPageName = "作品 1";
            } else if (flippedCount === 2) {
                leftPageName = "作品 2"; rightPageName = "作品 3";
            } else if (flippedCount === 3) {
                leftPageName = "作品 4"; rightPageName = "作品 5";
            } else if (flippedCount === 4) {
                leftPageName = "作品 6"; rightPageName = "作品 7";
            } else if (flippedCount === 5) {
                leftPageName = "作品 8"; rightPageName = "作品 9";
            } else if (flippedCount === 6) {
                leftPageName = "作品 10"; rightPageName = "作品 11";
            } else if (flippedCount === 7) {
                leftPageName = "THE END"; rightPageName = "無";
            }
        }
        updateVisiblePages(); 

        function triggerPetFright() {
            isJumping = true;
            isFrightened = true;
            jumpSpeed = -13; 
        }

        function updatePet() {
            const maxX = window.innerWidth - 110;
            const distanceToFloor = window.innerHeight - mouseY;

            // 智慧跟隨模式
            if (distanceToFloor < 250 && !isFrightened) {
                const targetX = mouseX - 55;
                const diffX = targetX - petX;
                if (Math.abs(diffX) > 10) {
                    speedX = diffX > 0 ? 3 : -3;
                    petX += speedX;
                } else {
                    speedX = diffX > 0 ? 0.1 : -0.1;
                }
            } else {
                // 自由漫步
                if (isFrightened && !isJumping) {
                    isFrightened = false;
                }
                petX += speedX;
            }

            // 跳躍物理
            if (isJumping) {
                jumpSpeed += gravity;
                jumpY += jumpSpeed;
                if (jumpY >= 0) {
                    jumpY = 0;
                    isJumping = false;
                    
                    bookContainer.classList.add('shake-effect');
                    setTimeout(() => { bookContainer.classList.remove('shake-effect'); }, 150);
                }
            } else {
                if (Math.random() < 0.008) {
                    isJumping = true;
                    jumpSpeed = -6 - Math.random() * 4;
                }
            }

            // 碰撞反彈
            if (petX <= 0) {
                petX = 0; speedX = Math.abs(speedX === 0 ? 2 : speedX);
            } else if (petX >= maxX) {
                petX = maxX; speedX = -Math.abs(speedX === 0 ? 2 : speedX);
            }

            if (distanceToFloor >= 250 && Math.random() < 0.005) speedX = -speedX;

            let flipStyle = "scaleX(1)";
            if (speedX < 0) {
                flipStyle = "scaleX(-1)";
            } else if (speedX === 0) {
                flipStyle = mouseX < petX + 55 ? "scaleX(-1)" : "scaleX(1)";
            }

            pet.style.left = `${petX}px`;
            pet.style.transform = `translateY(${jumpY}px) ${flipStyle}`;

            requestAnimationFrame(updatePet);
        }
        requestAnimationFrame(updatePet);

        // 點擊按讚 + 連擊爆發粒子機制
        pet.addEventListener('mousedown', (e) => {
            const currentTime = Date.now();
            
            // 判斷是否為連擊 (兩次點擊間隔小於 600 毫秒)
            if (currentTime - lastClickTime < 600) {
                comboCount++;
            } else {
                comboCount = 1;
            }
            lastClickTime = currentTime;

            let targetPage = rightPageName;
            if (e.clientX < window.innerWidth / 2) {
                targetPage = (leftPageName !== "無") ? leftPageName : rightPageName;
            } else {
                targetPage = (rightPageName !== "無") ? rightPageName : leftPageName;
            }

            likesData[targetPage]++;
            totalLikes++;

            // 變換寵物霓虹濾鏡
            const currentHue = (totalLikes * 25) % 360;
            petImg.style.filter = `hue-rotate(${currentHue}deg) brightness(1.3)`;

            // 【新功能】根據 Combo 連擊數量決定噴發的愛心煙火數量
            const burstCount = Math.min(comboCount * 5, 40); // 越多擊噴越多，上限 40 顆
            createHeartBurst(e.clientX, e.clientY, burstCount);

            // 建立浮空文字元件 (如果是 Combo 會特別標註)
            const effect = document.createElement('div');
            effect.className = 'like-effect';
            if (comboCount > 1) {
                effect.innerHTML = `🔥 COMBO ${comboCount}! ${targetPage} +${likesData[targetPage]}`;
                effect.style.color = '#ffff00'; // Combo 使用亮黃色
            } else {
                effect.innerHTML = `❤ ${targetPage}: +${likesData[targetPage]}`;
            }
            
            const petRect = pet.getBoundingClientRect();
            effect.style.left = `${petRect.left + 55}px`;
            effect.style.top = `${petRect.top - 20}px`;
            
            document.body.appendChild(effect);

            isJumping = true;
            jumpSpeed = -4 - Math.min(comboCount * 0.5, 4); // 連擊時寵物會越跳越高！

            effect.addEventListener('animationend', () => { effect.remove(); });
        });
    </script>
</body>
